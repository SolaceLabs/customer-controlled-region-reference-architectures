name: SKE Integration Tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "ske/**"
      - "testing/ske/**"
      - "testing/common/**"
      - "testing/charts/**"

permissions:
  id-token: write
  contents: read

jobs:
  test-ske:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      STACKIT_SERVICE_ACCOUNT_EMAIL: ${{ secrets.STACKIT_SERVICE_ACCOUNT_EMAIL }}
      STACKIT_USE_OIDC: 1
      TF_VAR_organization_id: ${{ secrets.STACKIT_ORG_ID }}
      TF_VAR_owner_email: ${{ secrets.STACKIT_OWNER_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: testing/ske/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Download Go modules
        working-directory: ./testing/ske
        run: go mod download

      - name: Run SKE integration tests
        working-directory: ./testing/ske
        run: go test -v -timeout 90m
